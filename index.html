<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/scripts.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
    <title>Movie Data Assignment</title>
  </head>


  <body>
    <h1 id="projectTitle">Lilo & Stich Movie Data</h1>

    <div class="container" id="mainData">
      <div class="row align-items-center">
        <div class="col-md-6 text-center">
          <img src="" alt="" id="movieImage" class="img-fluid" />
        </div>

        <div class="col-md-6 text-center">
          <h2 id="movieTitle"></h2>
          <p id="description"></p>

          <h3 id="setting">Setting</h3>

          <h5>Primary</h5>
          <p id="primary"></p>

          <h5>Secondary</h5>
          <p id="secondary"></p>
        </div>
      </div>
    </div>

    <div class="container" id="miscData">
      <div class="row">
        <div class="col-md-6">
          <h4 id="keyLocations">Key Locations</h4>
          <ul id="locationsList" class="list-group"></ul>
        </div>

        <div class="col-md-6">
          <h4 id="keyCharacters">Key Characters</h4>
          <ul id="charactersList" class="list-group"></ul>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
